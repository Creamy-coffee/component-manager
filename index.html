<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元件管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 现代化的 UI 配色与样式 */
        :root {
            --primary: #3b82f6; --primary-hover: #2563eb;
            --success: #10b981; --success-hover: #059669;
            --danger: #ef4444; --danger-hover: #dc2626;
            --warning: #f59e0b; --warning-hover: #d97706;
            --purple: #8b5cf6; --purple-hover: #7c3aed;
            --cloud: #0ea5e9; --cloud-hover: #0284c7;
            --loc: #14b8a6; --loc-hover: #0d9488;
            --bg-color: #f3f4f6; --card-bg: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280;
            --border-color: #e5e7eb; --highlight: #fef08a;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 1450px; margin: 0 auto; background: var(--card-bg); padding: 24px 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #111827; font-weight: 700; font-size: 28px; margin-bottom: 30px; letter-spacing: 1px; }

        .controls { display: flex; justify-content: space-between; margin-bottom: 24px; align-items: center; flex-wrap: wrap; gap: 16px; background: #f9fafb; padding: 16px; border-radius: 8px; border: 1px solid var(--border-color); }
        .search-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; flex: 1; }
        
        .filter-container { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-box, .filter-select { padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; transition: all 0.2s; background-color: #fff; box-sizing: border-box; }
        .search-box { min-width: 240px; flex: 1; }
        .filter-select { min-width: 120px; flex: 1; }
        .search-box:focus, .filter-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .scan-box { border: 1px dashed var(--primary); background-color: #eff6ff; width: 160px; flex: unset; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary); } .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); } .btn-success:hover { background-color: var(--success-hover); }
        .btn-danger { background-color: var(--danger); } .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-warning { background-color: var(--warning); color: #fff; } .btn-warning:hover { background-color: var(--warning-hover); }
        .btn-import { background-color: var(--purple); } .btn-import:hover { background-color: var(--purple-hover); }
        .btn-cloud { background-color: var(--cloud); } .btn-cloud:hover { background-color: var(--cloud-hover); }
        .btn-loc { background-color: var(--loc); } .btn-loc:hover { background-color: var(--loc-hover); }

        .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8fafc; font-weight: 600; color: #475569; font-size: 14px; position: sticky; top: 0; z-index: 10; }
        td { font-size: 14px; color: #334155; }
        tr:hover { background-color: #f1f5f9; }
        .highlight-row td { background-color: var(--highlight) !important; }
        .badge { background: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 12px; font-size: 12px; display: inline-block; margin-top: 4px; }
        .loc-badge { background: #ccfbf1; color: #0f766e; font-weight: bold; border: 1px solid #99f6e4; }
        .stock-num { font-size: 18px; font-weight: 700; }
        .actions { display: flex; gap: 6px; }
        .lcsc-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 15px; }
        .lcsc-link:hover { text-decoration: underline; color: var(--primary-hover); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(17,24,39,0.6); backdrop-filter: blur(2px); justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-bg); padding: 24px; border-radius: 12px; width: 550px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); animation: modalFadeIn 0.2s ease-out; box-sizing: border-box; }
        @keyframes modalFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .modal h2 { margin-top: 0; color: #111827; font-size: 20px; }
        
        .form-flex-row { display: flex; gap: 10px; }
        .form-group { margin-bottom: 16px; flex: 1; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color); flex-wrap: wrap; }
        .btn-cancel { background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db; } .btn-cancel:hover { background-color: #e5e7eb; }
        
        #excelFileInput { display: none; }
        .qr-reader { width: 100%; border: none !important; border-radius: 8px; overflow: hidden; background: #000; position: relative; }
        .scan-log-container { margin-top: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; min-height: 80px; max-height: 150px; overflow-y: auto; }
        .scan-log-item { display: block; padding: 6px 10px; border-radius: 6px; font-size: 13px; margin-bottom: 4px; background: #fff; border: 1px solid #e2e8f0; }
        .log-success { border-left: 4px solid var(--success); }
        .log-warning { border-left: 4px solid var(--warning); }
        .log-danger { border-left: 4px solid var(--danger); }
        
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--cloud); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 📱 移动端自适应完美适配 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 16px 12px; }
            h1 { font-size: 22px; margin-bottom: 20px; }
            .controls { flex-direction: column; align-items: stretch; gap: 12px; padding: 12px; }
            .search-group { flex-direction: column; width: 100%; align-items: stretch; }
            .search-box, .scan-box { width: 100%; max-width: none; }
            .filter-container { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 8px; }
            .filter-select { width: 100%; min-width: unset; padding: 8px; font-size: 13px; }
            .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
            .btn-group .btn { width: 100%; padding: 12px 10px; }
            .btn-loc { grid-column: span 2; }
            .modal { width: 95%; padding: 16px; margin: 10px; }
            .form-flex-row { flex-direction: column; gap: 0; }
            .modal-actions { justify-content: stretch; }
            .modal-actions .btn { flex: 1; text-align: center; }
            th, td { padding: 10px 8px; font-size: 13px; }
            .actions { flex-direction: column; }
            .actions .btn { width: 100%; margin-bottom: 4px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <h3 id="loadingText" style="color: var(--text-main);">正在操作...</h3>
</div>

<div class="container">
    <h1>🗃️ 元件管理系统</h1>
    
    <div class="controls">
        <div class="search-group">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 全局搜索: 型号、编号、位号或备注..." oninput="filterTable()">
            
            <div class="filter-container">
                <select id="locationFilter" class="filter-select" onchange="filterTable()">
                    <option value="">📍 所有区域</option>
                </select>
                <select id="brandFilter" class="filter-select" onchange="filterTable()">
                    <option value="">🏢 所有品牌</option>
                </select>
                <select id="typeFilter" class="filter-select" onchange="filterTable()">
                    <option value="">🏷️ 所有类型</option>
                </select>
                <select id="packageFilter" class="filter-select" onchange="filterTable()">
                    <option value="">📏 所有封装</option>
                </select>
                <select id="stockFilter" class="filter-select" onchange="filterTable()">
                    <option value="">📦 所有库存</option>
                    <option value="in-stock">✅ 有库存 (>0)</option>
                    <option value="out-of-stock">❌ 已缺货 (0)</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 4px;">
                <input type="text" id="scanInput" class="search-box scan-box" style="flex: 1;" placeholder="🔌 物理枪查件..." onkeypress="handlePhysicalScan(event, 'search')">
                <button class="btn btn-primary" onclick="openCameraModal('search')" style="flex-shrink: 0;">📷 扫码查件</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-loc" onclick="openCameraModal('location')">🏷️ 批量分配位号</button>
            <button class="btn btn-cloud" onclick="openSyncModal()">☁️ 云端同步</button>
            <button class="btn btn-success" onclick="openModal()">➕ 手动添加</button>
            <button class="btn btn-import" onclick="document.getElementById('excelFileInput').click()">📥 导入账单</button>
            <input type="file" id="excelFileInput" accept=".xls,.xlsx,.csv" onchange="handleFileUpload(event)">
            <button class="btn btn-danger" onclick="deleteAllComponents()">🗑️ 清空全部库存</button>
        </div>
    </div>

    <div class="table-container">
        <table id="componentTable">
            <thead>
                <tr>
                    <th>商品编号 / 链接</th>
                    <th>存放位号</th>
                    <th>品牌 & 类型</th>
                    <th>商品名称</th>
                    <th>型号 & 封装</th>
                    <th>库存</th>
                    <th>📝 备注信息</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="syncModalOverlay">
    <div class="modal">
        <h2>☁️ GitHub 云端数据同步</h2>
        <p style="color:var(--text-muted); font-size:13px;">数据将安全地保存在您的私有仓库中。</p>
        <div class="form-group">
            <label>GitHub 仓库链接或路径</label>
            <input type="text" id="ghRepoLink" placeholder="例: https://github.com/用户名/仓库名 或 用户名/仓库名">
        </div>
        <div class="form-group">
            <label>Personal Access Token (密钥)</label>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxx">
        </div>
        <div style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px; border-radius: 6px; margin-top: 20px;">
            <p style="margin: 0; font-size: 13px; color: #166534; font-weight: bold;">⚠️ 操作说明：</p>
            <ul style="margin: 5px 0 0; font-size: 12px; color: #166534; padding-left: 20px;">
                <li><b>上传：</b>将当前数据推送到 GitHub（覆盖云端）。电脑盘点完后点这个。</li>
                <li><b>下载：</b>从 GitHub 拉取数据（覆盖本地）。手机首次打开或更新时点这个。</li>
            </ul>
        </div>
        <div class="modal-actions" style="justify-content: space-between;">
            <button class="btn btn-cancel" onclick="closeSyncModal()">关闭</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-warning" onclick="downloadFromGitHub()" style="background-color: var(--warning);">⬇️ 下载</button>
                <button class="btn btn-cloud" onclick="uploadToGitHub()">⬆️ 上传</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 id="modalTitle">添加新元件</h2>
        <input type="hidden" id="editId">
        <div class="form-flex-row">
            <div class="form-group"><label>商品编号 (C号)</label><input type="text" id="lcsc" placeholder="如: C22451316"></div>
            <div class="form-group"><label>存放位号</label><input type="text" id="location" placeholder="如: 4-2-1"></div>
            <div class="form-group"><label>库存数量</label><input type="number" id="quantity" min="0" placeholder="如: 10"></div>
        </div>
        <div class="form-flex-row">
            <div class="form-group"><label>品牌</label><input type="text" id="brand" placeholder="如: 兴飞"></div>
            <div class="form-group"><label>商品类型</label><input type="text" id="type" placeholder="如: 胶壳"></div>
        </div>
        <div class="form-group"><label>商品型号 <span style="color:red">*</span></label><input type="text" id="model" placeholder="必填项"></div>
        <div class="form-group"><label>封装格式</label><input type="text" id="package" placeholder="如: P=2mm"></div>
        <div class="form-group"><label>商品名称 / 参数</label><input type="text" id="name" placeholder="如: 2x7P 2mm 袋装"></div>
        <div class="form-group"><label>🔗 自定义跳转链接 (非立创元件填写)</label><input type="url" id="customLink" placeholder="如: https://item.taobao.com/..."></div>
        <div class="form-group"><label>📝 备注说明</label><textarea id="remark" rows="2" placeholder="存放位置、良品率或其他特殊说明..."></textarea></div>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveComponent()">保存数据</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="useModalOverlay">
    <div class="modal" style="width: 400px; max-width: 90%;">
        <h2>📦 领用/扣减元件</h2>
        <div style="background: #f8fafc; padding: 12px; border-radius: 6px; margin-bottom: 16px; border: 1px solid #e2e8f0;">
            <p id="useComponentInfo" style="margin: 0; color: #475569; font-size: 14px; line-height: 1.6;"></p>
        </div>
        <input type="hidden" id="useId">
        <div class="form-group"><label>本次领用数量</label><input type="number" id="useQuantity" min="1" value="1" style="font-size: 18px; font-weight: bold;"></div>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeUseModal()">取消</button>
            <button class="btn btn-warning" onclick="confirmUseComponent()">确认扣减</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="cameraModalOverlay">
    <div class="modal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <h2 id="scannerTitle" style="margin: 0;">📷 扫描工作台</h2>
            <div style="display: flex; align-items: center; gap: 8px;">
                <select id="scanCooldownSelect" onchange="updateScanCooldown()" style="padding: 4px; border-radius: 4px; border: 1px solid #d1d5db; font-size: 12px; background: #fff; cursor: pointer;">
                    <option value="0">⚡ 极速 (无延迟)</option>
                    <option value="1000">🐇 快速 (1秒)</option>
                    <option value="2000" selected>🚶 标准 (2秒)</option>
                    <option value="3000">🐢 缓慢 (3秒)</option>
                </select>
                <button class="btn btn-warning" onclick="toggleFlashlight()" style="padding: 4px 12px; font-size: 12px;">🔦 闪光灯</button>
            </div>
        </div>
        
        <div id="locationConfigPanel" style="display: none; background: #f0fdf4; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #bbf7d0;">
            <div class="form-flex-row">
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>前缀位码 (如: 4-2)</label>
                    <input type="text" id="locPrefix" value="4-2" style="border-color: var(--success);" oninput="updateNextLocationIndex()">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>分配序号</label>
                    <input type="number" id="locIndex" value="1" style="border-color: var(--success);">
                </div>
            </div>
            
            <div class="form-flex-row" style="margin-top: 12px; align-items: center; justify-content: space-between; background: #fff; padding: 8px 10px; border-radius: 6px; border: 1px dashed #86efac;">
                <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: #166534; font-weight: bold; font-size: 13px; margin-bottom: 0;">
                    <input type="checkbox" id="insertMode"> 🔄 插入模式 (此位置及后续序号自动+1)
                </label>
                <button class="btn btn-danger" onclick="clearAllLocations()" style="padding: 4px 10px; font-size: 12px; background-color: #ef4444; border-radius: 4px;">🗑️ 清空所有位号</button>
            </div>

            <div class="form-group" style="margin-bottom: 0; margin-top: 12px;">
                <label>手动补录 (扫码困难时直接输入C号并分配)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="manualLocInput" placeholder="如: C2234..." onkeypress="handlePhysicalScan(event, 'location')">
                    <button class="btn btn-loc" onclick="handleManualLoc()" style="flex-shrink: 0;">分配</button>
                </div>
            </div>
        </div>

        <div id="qr-reader" class="qr-reader"></div>
        
        <div class="scan-log-container" id="scan-log-container">
            <div style="color: #94a3b8; font-size: 13px; text-align: center; margin-top: 20px;" id="scan-log-placeholder">等待扫描...</div>
            <div id="scan-log-list"></div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-danger" onclick="clearContinuousScans()" style="margin-right: auto;">清空日志</button>
            <button class="btn btn-primary" onclick="closeCameraModal()">完成关闭</button>
        </div>
    </div>
</div>

<script>
    let components = [];
    let githubConfig = { repoLink: '', token: '', sha: null, user: '', repo: '' };
    const FILE_PATH = 'data.json';

    let html5QrcodeScanner = null;
    let currentScannerMode = 'search'; 
    let lastScannedCode = '';
    let lastScanTime = 0;
    let isConfirming = false; 
    let isFlashlightOn = false;
    let continuousScannedSet = new Set();
    
    // 新增：全局扫码冷却时间
    let currentScanCooldown = 2000; 

    // 初始化
    function init() {
        const storedData = localStorage.getItem('componentData');
        if (storedData) {
            components = JSON.parse(storedData);
            components.forEach(c => { 
                if (!c.history) c.history = []; 
                if (!c.remark) c.remark = ""; 
                if (!c.location) c.location = "";
                if (!c.customLink) c.customLink = "";
            });
        }
        const storedConfig = localStorage.getItem('githubConfig');
        if (storedConfig) {
            githubConfig = Object.assign(githubConfig, JSON.parse(storedConfig));
        }
        
        // 加载用户保存的冷却时间配置
        const storedCooldown = localStorage.getItem('scanCooldown');
        if (storedCooldown) {
            currentScanCooldown = parseInt(storedCooldown);
            const selectEl = document.getElementById('scanCooldownSelect');
            if (selectEl) selectEl.value = currentScanCooldown;
        }

        updateDropdownFilters();
        renderTable(components);
    }

    // ----------------------------------------------------
    // 表格与 UI 渲染
    // ----------------------------------------------------
    function updateDropdownFilters() {
        const locationFilter = document.getElementById('locationFilter');
        const currentLoc = locationFilter.value;
        const prefixes = [...new Set(components.map(c => {
            if (!c.location) return '';
            const lastDashIndex = c.location.lastIndexOf('-');
            return lastDashIndex > 0 ? c.location.substring(0, lastDashIndex) : c.location;
        }).filter(l => l && l.trim() !== ''))].sort();
        
        locationFilter.innerHTML = '<option value="">📍 所有区域</option>' + prefixes.map(l => `<option value="${l}">${l}</option>`).join('');
        if (prefixes.includes(currentLoc)) locationFilter.value = currentLoc;

        const typeFilter = document.getElementById('typeFilter');
        const currentType = typeFilter.value;
        const types = [...new Set(components.map(c => c.type).filter(t => t && t.trim() !== ''))].sort();
        typeFilter.innerHTML = '<option value="">🏷️ 所有类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
        if (types.includes(currentType)) typeFilter.value = currentType;

        const brandFilter = document.getElementById('brandFilter');
        const currentBrand = brandFilter.value;
        const brands = [...new Set(components.map(c => c.brand).filter(b => b && b.trim() !== ''))].sort();
        brandFilter.innerHTML = '<option value="">🏢 所有品牌</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
        if (brands.includes(currentBrand)) brandFilter.value = currentBrand;

        const packageFilter = document.getElementById('packageFilter');
        const currentPackage = packageFilter.value;
        const packages = [...new Set(components.map(c => c.package).filter(p => p && p.trim() !== ''))].sort();
        packageFilter.innerHTML = '<option value="">📏 所有封装</option>' + packages.map(p => `<option value="${p}">${p}</option>`).join('');
        if (packages.includes(currentPackage)) packageFilter.value = currentPackage;
    }

    function saveToStorage() { localStorage.setItem('componentData', JSON.stringify(components)); updateDropdownFilters(); }
    function playBeepSound() { try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); oscillator.connect(gainNode); gainNode.connect(audioCtx.destination); oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05); } catch(e) {} }

    function filterTable() {
        const queryStr = document.getElementById('searchInput').value.toLowerCase();
        const locationFilterVal = document.getElementById('locationFilter').value;
        const typeFilterVal = document.getElementById('typeFilter').value;
        const brandFilterVal = document.getElementById('brandFilter').value;
        const packageFilterVal = document.getElementById('packageFilter').value;
        const stockFilterVal = document.getElementById('stockFilter').value;
        const terms = queryStr.split(/[\s,]+/).filter(t => t !== '');
        
        const filtered = components.filter(comp => {
            if (locationFilterVal) {
                if (!comp.location) return false;
                const isMatch = comp.location === locationFilterVal || comp.location.startsWith(locationFilterVal + '-');
                if (!isMatch) return false;
            }
            if (typeFilterVal && comp.type !== typeFilterVal) return false;
            if (brandFilterVal && comp.brand !== brandFilterVal) return false;
            if (packageFilterVal && comp.package !== packageFilterVal) return false;
            if (stockFilterVal === 'in-stock' && comp.quantity <= 0) return false;
            if (stockFilterVal === 'out-of-stock' && comp.quantity > 0) return false;
            if (terms.length > 0) {
                const matchText = terms.some(term => 
                    (comp.brand && comp.brand.toLowerCase().includes(term)) || 
                    (comp.model && comp.model.toLowerCase().includes(term)) || 
                    (comp.name && comp.name.toLowerCase().includes(term)) || 
                    (comp.lcsc && comp.lcsc.toLowerCase().includes(term)) || 
                    (comp.remark && comp.remark.toLowerCase().includes(term)) ||
                    (comp.location && comp.location.toLowerCase().includes(term))
                );
                if (!matchText) return false;
            }
            return true;
        });
        renderTable(filtered, terms);
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function updateNextLocationIndex() {
        const prefix = document.getElementById('locPrefix').value.trim();
        const idxInput = document.getElementById('locIndex');
        if (!prefix) { idxInput.value = 1; return; }
        
        let maxIdx = 0;
        const regex = new RegExp(`^${escapeRegExp(prefix)}-(\\d+)$`, 'i');
        components.forEach(c => {
            if (c.location) {
                const match = c.location.match(regex);
                if (match) {
                    const num = parseInt(match[1], 10);
                    if (num > maxIdx) maxIdx = num;
                }
            }
        });
        idxInput.value = maxIdx + 1;
    }

        const track = video.srcObject.getVideoTracks()[0];
        if (!track) return;

    function onCameraScanSuccess(decodedText) {
        if (isConfirming) return; 
        const now = Date.now();
        
        // 核心更新：使用可配置的全局冷却时间
        if ((now - lastScanTime) < currentScanCooldown) return;
        lastScannedCode = decodedText; 
        lastScanTime = now;
        
        const match = decodedText.match(/pc\s*:\s*(C\d+)/i);
        if (match && match[1]) {
            const lcsc = match[1].toUpperCase();
            
            if (!continuousScannedSet.has(lcsc)) {
                continuousScannedSet.add(lcsc);
                
                if (currentScannerMode === 'location') {
                    processLocationAssignment(lcsc);
                } else {
                    processSearchScan(lcsc);
                }
            }
        }
    }

    // 【模式1】查件与自动建档
    function processSearchScan(lcsc) {
        playBeepSound();
        const exists = components.some(c => c.lcsc && c.lcsc.toUpperCase() === lcsc);
        if (!exists) {
            const newId = components.length > 0 ? Math.max(...components.map(c => c.id)) + 1 : 1;
            components.push({ id: newId, lcsc: lcsc, brand: '未知', type: '未分类', name: '⚠️未入库(新扫入)', model: '待完善', package: '-', quantity: 0, location: '', customLink: '', remark: '请点击编辑完善', history: [] });
            saveToStorage();
        }
        logScanMessage(`✔️ 查件: ${lcsc}`, 'success');
        const searchInput = document.getElementById('searchInput');
        let currentSearch = searchInput.value.trim();
        if (currentSearch && !currentSearch.match(/C\d+/i)) currentSearch = '';
        if (currentSearch) { if (!currentSearch.toUpperCase().includes(lcsc)) searchInput.value = currentSearch + " " + lcsc; } else { searchInput.value = lcsc; }
        filterTable();
    }

    // 【模式2】批量分配位号 (含插入自动后移功能)
    function processLocationAssignment(lcsc) {
        const prefix = document.getElementById('locPrefix').value.trim();
        const idxInput = document.getElementById('locIndex');
        const isInsertMode = document.getElementById('insertMode').checked;
        let currentIdx = parseInt(idxInput.value) || 1;

        if (!prefix) { alert("请填写前缀位码！"); continuousScannedSet.delete(lcsc); return; }
        playBeepSound();

        let comp = components.find(c => c.lcsc && c.lcsc.toUpperCase() === lcsc);
        if (!comp) {
            logScanMessage(`❌ 库中未找到 ${lcsc}，请先入库！`, 'danger');
            continuousScannedSet.delete(lcsc); 
            return;
        }

        const newLoc = `${prefix}-${currentIdx}`;

        if (isInsertMode) {
            const regex = new RegExp(`^${escapeRegExp(prefix)}-(\\d+)$`, 'i');
            let compsToShift = [];
            components.forEach(c => {
                if (c.location && c.id !== comp.id) {
                    const match = c.location.match(regex);
                    if (match) {
                        const num = parseInt(match[1], 10);
                        if (num >= currentIdx) {
                            compsToShift.push({ comp: c, oldIdx: num });
                        }
                    }
                }
            });
            compsToShift.sort((a, b) => b.oldIdx - a.oldIdx);
            compsToShift.forEach(item => {
                item.comp.location = `${prefix}-${item.oldIdx + 1}`;
            });
            
            comp.location = newLoc;
            idxInput.value = currentIdx + 1;
            logScanMessage(`✅ ${lcsc} 插入成功: ${newLoc} (后移了 ${compsToShift.length} 个元件)`, 'success');
        } else {
            const existingComp = components.find(c => c.location === newLoc && c.id !== comp.id);
            if (existingComp) {
                isConfirming = true;
                if (confirm(`⚠️ 位号冲突检测\n\n位号 [${newLoc}] 已被元件 ${existingComp.lcsc} (${existingComp.model}) 占用！\n\n点击【确定】强行抢占该位号 (原元件的位号将被清空)\n点击【取消】放弃分配`)) {
                    existingComp.location = ''; 
                    comp.location = newLoc;
                    idxInput.value = currentIdx + 1;
                    logScanMessage(`✅ ${lcsc} 强行抢占成功: ${newLoc}`, 'success');
                } else {
                    logScanMessage(`ℹ️ ${lcsc} 取消分配`, 'warning');
                    continuousScannedSet.delete(lcsc); 
                    isConfirming = false;
                    return; 
                }
                isConfirming = false;
            } else {
                comp.location = newLoc;
                idxInput.value = currentIdx + 1;
                logScanMessage(`✅ ${lcsc} 成功分配: ${newLoc}`, 'success');
            }
        }

        saveToStorage();
        document.getElementById('searchInput').value = lcsc;
        filterTable();
    }

    function handlePhysicalScan(event, mode) {

            const rawLcsc = match ? match[1].toUpperCase() : scanText.toUpperCase(); 
            
            if (rawLcsc.startsWith('C')) {

            } else {

            event.target.value = ''; 
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try { const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'}); const firstSheet = workbook.Sheets[workbook.SheetNames[0]]; const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1}); processExcelData(jsonData); } catch (error) { alert('解析出错。'); }
            document.getElementById('excelFileInput').value = ''; 
        };
        reader.readAsArrayBuffer(file);
    }

    function processExcelData(rows) {
        let headerRowIdx = -1, headers = [];
        for (let i = 0; i < rows.length; i++) { const cols = (rows[i] || []).map(c => c != null ? String(c).trim() : ''); if (cols.includes('商品编号') && cols.includes('商品型号')) { headerRowIdx = i; headers = cols; break; } }
        if (headerRowIdx === -1) { alert('未找到必要列！'); return; }
        const idxLcsc = headers.indexOf('商品编号'), idxBrand = headers.indexOf('品牌'), idxType = headers.indexOf('商品类型'), idxName = headers.indexOf('商品名称'), idxModel = headers.indexOf('商品型号'), idxPackage = headers.indexOf('封装格式'), idxQty = headers.indexOf('型号发货数量'), idxOrderNo = headers.indexOf('订单编号'), idxOrderTime = headers.indexOf('下单时间');
        let addedCount = 0, updatedCount = 0, skippedCount = 0;
        for (let i = headerRowIdx + 1; i < rows.length; i++) {
            const rowData = rows[i] || []; if (rowData.length === 0) continue; 
            const getCell = (idx) => (idx > -1 && rowData[idx] != null) ? String(rowData[idx]).trim() : '';
            const lcsc = getCell(idxLcsc).toUpperCase(), brand = getCell(idxBrand), type = getCell(idxType), name = getCell(idxName), model = getCell(idxModel), pkg = getCell(idxPackage), quantity = parseFloat(getCell(idxQty)) || 0, orderNo = getCell(idxOrderNo), orderTime = getCell(idxOrderTime);
            if (!model || model.includes('合计') || model.includes('说明：')) continue; if (quantity <= 0) continue;
            const recordFingerprint = `${orderNo}_${orderTime}`;
            const existingIdx = components.findIndex(c => (lcsc && c.lcsc === lcsc) || (!lcsc && c.model === model && c.package === pkg));
            if (existingIdx > -1) {
                let comp = components[existingIdx]; if (!comp.history) comp.history = [];
                if (orderNo && orderTime && comp.history.includes(recordFingerprint)) { skippedCount++; continue; }
                comp.quantity += quantity; if (!comp.lcsc && lcsc) comp.lcsc = lcsc; if (orderNo && orderTime) comp.history.push(recordFingerprint); updatedCount++;
            } else {
                const newId = components.length > 0 ? Math.max(...components.map(c => c.id)) + 1 : 1; let newHistory = []; if (orderNo && orderTime) newHistory.push(recordFingerprint);
                components.push({ id: newId, lcsc, location: '', brand, type, name, model, package: pkg, quantity, customLink: '', remark: '', history: newHistory }); addedCount++;
            }
        }
        saveToStorage(); filterTable();
        let alertMsg = `导入完成！\n新增了 ${addedCount} 种，更新了 ${updatedCount} 种。`;
        if (skippedCount > 0) alertMsg += `\n\n自动拦截 ${skippedCount} 条重复导入。`;
        alert(alertMsg);
    }

    function closeSyncModal() { document.getElementById('syncModalOverlay').style.display = 'none'; }
    function saveGithubConfig() {
        const link = document.getElementById('ghRepoLink').value.trim(); const token = document.getElementById('ghToken').value.trim();
        let user = '', repo = ''; const match = link.match(/(?:github\.com\/)?([^\/]+)\/([^\/\s]+)/i);
        if (match) { user = match[1]; repo = match[2].replace(/\.git$/i, ''); }
        githubConfig = { repoLink: link, token: token, sha: githubConfig.sha, user: user, repo: repo }; localStorage.setItem('githubConfig', JSON.stringify(githubConfig));
    }
    function showLoading(text) { document.getElementById('loadingText').innerText = text; document.getElementById('loadingOverlay').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
    function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
    function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

    async function downloadFromGitHub() {
        saveGithubConfig();
        if(!githubConfig.user || !githubConfig.repo) { alert("无法解析仓库，请确保格式如: 用户名/仓库名"); return; }
        if(!githubConfig.token) { alert("请填写 Personal Access Token！"); return; }
        if(components.length > 0 && !confirm("⚠️ 警告：下载将覆盖您当前的本地数据。确定要继续吗？")) return;

        showLoading("正在连接 GitHub 获取数据...");
        try {
            const url = `https://api.github.com/repos/${githubConfig.user}/${githubConfig.repo}/contents/${FILE_PATH}`;
            const response = await fetch(url, { headers: { 'Authorization': `Bearer ${githubConfig.token}`, 'Accept': 'application/vnd.github.v3+json' } });
            if (response.status === 404) { alert("在仓库中未找到数据文件 (首次使用请先上传)。"); } 
            else if (!response.ok) { throw new Error(`请求失败: ${response.status}`); } 
            else {
                const data = await response.json(); githubConfig.sha = data.sha; localStorage.setItem('githubConfig', JSON.stringify(githubConfig));
                components = JSON.parse(b64_to_utf8(data.content)); saveToStorage(); filterTable(); alert("🎉 同步成功！数据已从云端恢复。"); closeSyncModal();
            }
        } catch (error) { console.error(error); alert("下载出错：\n" + error.message); } finally { hideLoading(); }
    }

    async function uploadToGitHub() {
        saveGithubConfig();
        if(!githubConfig.user || !githubConfig.repo) { alert("无法解析仓库，请确保格式如: 用户名/仓库名"); return; }
        if(!githubConfig.token) { alert("请填写 Personal Access Token！"); return; }

        showLoading("正在打包数据并上传至 GitHub...");
        try {
            const url = `https://api.github.com/repos/${githubConfig.user}/${githubConfig.repo}/contents/${FILE_PATH}`;
            let currentSha = githubConfig.sha;
            const getResp = await fetch(url, { headers: { 'Authorization': `Bearer ${githubConfig.token}` } });
            if (getResp.ok) { const existingFile = await getResp.json(); currentSha = existingFile.sha; }

            const bodyData = { message: `Update inventory - ${new Date().toLocaleString()}`, content: utf8_to_b64(JSON.stringify(components, null, 2)) };
            if (currentSha) bodyData.sha = currentSha;

            const putResp = await fetch(url, { method: 'PUT', headers: { 'Authorization': `Bearer ${githubConfig.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData) });
            if (!putResp.ok) throw new Error(`上传失败: ${putResp.status}`);

            const putResult = await putResp.json(); githubConfig.sha = putResult.content.sha; localStorage.setItem('githubConfig', JSON.stringify(githubConfig));
            alert("☁️ 上传成功！最新数据已安全存入 GitHub 仓库。"); closeSyncModal();
        } catch (error) { console.error(error); alert("上传出错：\n" + error.message); } finally { hideLoading(); }
    }

    window.onload = init;
</script>
